name: Auto Update IBM Lifecycle

on:
  schedule:
    - cron: '0 0 * * 1' # 每週一執行
  workflow_dispatch:

jobs:
  update-lifecycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: '.github/workflows/requirements.txt'

      - name: Install dependencies
        run: |
          pip install -r .github/workflows/requirements.txt
          playwright install chromium

      - name: Run Scraper
        run: python ssi_v2.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: 自動更新 IBM 生命週期表 (AP Region) [skip ci]"
          file_pattern: 'readme.md'
